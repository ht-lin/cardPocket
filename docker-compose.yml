services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: cardpocket
      POSTGRES_PASSWORD: cardpocket
      POSTGRES_DB: cardpocket_dev
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_data:
