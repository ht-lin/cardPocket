# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'

    # Stateless JWT API — all firewalls are stateless, nothing reads/writes the session.
    session: false

    #esi: true
    #fragments: true

when@prod:
    framework:
        # Trust the immediate upstream proxy so X-Forwarded-Proto is respected,
        # enabling correct HTTPS detection and HSTS header delivery.
        trusted_proxies: '127.0.0.1,REMOTE_ADDR'
        trusted_headers: ['x-forwarded-for', 'x-forwarded-host', 'x-forwarded-proto', 'x-forwarded-port', 'x-forwarded-prefix']

when@test:
    framework:
        test: true
