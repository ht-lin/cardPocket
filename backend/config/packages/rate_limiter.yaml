framework:
    rate_limiter:
        register_by_ip:
            policy: sliding_window
            limit: 5
            interval: '1 hour'
            cache_pool: cache.rate_limiter

        login_by_ip:
            policy: sliding_window
            limit: 10
            interval: '1 minute'
            cache_pool: cache.rate_limiter

        resend_verification_by_user:
            policy: sliding_window
            limit: 3
            interval: '1 hour'
            cache_pool: cache.rate_limiter

        send_friend_request_by_user:
            policy: sliding_window
            limit: 20
            interval: '1 day'
            cache_pool: cache.rate_limiter

when@dev:
    framework:
        rate_limiter:
            register_by_ip:
                policy: no_limit
            login_by_ip:
                policy: no_limit
            resend_verification_by_user:
                policy: no_limit
            send_friend_request_by_user:
                policy: no_limit

when@test:
    framework:
        rate_limiter:
            register_by_ip:
                policy: no_limit
            login_by_ip:
                policy: no_limit
            resend_verification_by_user:
                policy: no_limit
            send_friend_request_by_user:
                policy: no_limit
