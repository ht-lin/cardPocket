security:
    password_hashers:
        App\Entity\User:
            algorithm: auto

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|assets|build)/
            security: false

        api_auth_refresh:
            pattern: ^/api/auth/refresh
            stateless: true
            provider: app_user_provider
            refresh_jwt:
                check_path: /api/auth/refresh

        auth_public:
            pattern: ^/api/auth/(login|register|verify-email|logout|resend-verification)
            stateless: true
            security: false

        api_docs:
            pattern: ^/api/docs
            security: false

        api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            jwt: ~

    access_control:
        # Unlike the other /api/auth/* endpoints, registering a push token requires authentication.
        - { path: ^/api/auth/push-token, roles: IS_AUTHENTICATED_FULLY }
        - { path: ^/api/auth, roles: PUBLIC_ACCESS }
        - { path: ^/api/docs, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            App\Entity\User:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
