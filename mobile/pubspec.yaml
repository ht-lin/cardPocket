name: card_pocket
description: "CardPocket — store and share loyalty/membership card barcodes."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management (Riverpod 3.x)
  flutter_riverpod: ^3.3.2
  riverpod_annotation: ^4.0.3

  # Navigation
  go_router: ^17.3.0

  # Local database (Drift 2.34 — NativeDatabase.createInBackground for background isolate)
  drift: ^2.34.0
  drift_flutter: ^0.3.0
  # drift_flutter 0.3.0 requires sqlite3_flutter_libs 0.6.x (ships native SQLite on Android)
  sqlite3_flutter_libs: ">=0.6.0 <0.7.0"

  # Push notifications (FCM — see ADR-008)
  firebase_core: ^4.1.1
  firebase_messaging: ^16.0.2

  # HTTP client
  dio: ^5.9.2

  # Secure token storage
  flutter_secure_storage: ^10.3.1

  # Barcode scanning & rendering
  mobile_scanner: ^7.2.0
  barcode_widget: ^2.0.4

  # Crash reporting (9.x required for Kotlin 2.x / AGP 9 toolchain)
  sentry_flutter: ^9.0.0

  # Screen brightness control (barcode display page)
  screen_brightness: ^2.1.9

  # UI utilities
  shimmer: ^3.0.0

  # In-app brand logo (theme-aware SVG rendering)
  flutter_svg: ^2.3.0

  # Code-gen runtime annotations
  freezed_annotation: ^3.1.0
  json_annotation: ^4.12.0

  # File path utilities (for Drift database path)
  path_provider: ^2.1.5
  path: ^1.9.0
  connectivity_plus: ^7.1.1
  flutter_colorpicker: ^1.1.0

  # Phase 3: share exported data, pick images, receive shared images
  share_plus: ^13.1.0
  image_picker: ^1.2.2
  receive_sharing_intent: ^1.8.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.15.0
  riverpod_generator: ^4.0.4
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  drift_dev: ^2.34.0

  # Mocking
  mocktail: ^1.0.5

  # Linting
  flutter_lints: ^6.0.0

  # App icon & native splash generation
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.8

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/logo/

# Launcher icons (run: dart run flutter_launcher_icons)
flutter_launcher_icons:
  image_path: "assets/icon/icon.png"
  # Android adaptive icon (foreground/background/monochrome layers)
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "assets/icon/adaptive_background.png"
  adaptive_icon_foreground: "assets/icon/adaptive_foreground.png"
  adaptive_icon_monochrome: "assets/icon/adaptive_monochrome.png"
  # iOS: strip alpha on base icon; iOS 18 dark & tinted variants
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#111827"
  image_path_ios_dark_transparent: "assets/icon/icon_dark.png"
  image_path_ios_tinted_grayscale: "assets/icon/icon.png"
  desaturate_tinted_to_grayscale_ios: true

# Native splash screen (run: dart run flutter_native_splash:create)
flutter_native_splash:
  color: "#f7f8f9"
  color_dark: "#111827"
  image: assets/splash/splash_light.png
  image_dark: assets/splash/splash_dark.png
  android_12:
    color: "#f7f8f9"
    color_dark: "#111827"
    image: assets/splash/splash_light.png
    image_dark: assets/splash/splash_dark.png
